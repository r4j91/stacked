name: Stacked
options:
  bundleIdPrefix: com.stacked
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Hugeicons:
    url: https://github.com/isapozhnik/hugeicons-swift.git
    from: "4.1.6"

targets:
  Stacked:
    type: application
    platform: iOS
    sources:
      - path: Stacked
      - path: Shared
      - path: Stacked/Resources
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Hugeicons
        product: Hugeicons
      - target: StackedWidgetExtension
        embed: true
    entitlements:
      path: Stacked/Stacked.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stacked.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Stacked
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    info:
      path: Stacked/Info.plist
      properties:
        CFBundleName: Stacked
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        CFBundleURLTypes:
          - CFBundleURLName: com.stacked.app
            CFBundleURLSchemes:
              - stacked

  StackedWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StackedWidget
      - path: Shared
    entitlements:
      path: StackedWidget/StackedWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stacked.app.widget
        SKIP_INSTALL: YES
        INFOPLIST_FILE: StackedWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO

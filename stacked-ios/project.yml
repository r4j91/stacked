name: Stacked
options:
  bundleIdPrefix: com.stacked
  deploymentTarget:
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    # Mesmo team do Flutter (ios/Runner). Troque se usar outra conta no Xcode.
    DEVELOPMENT_TEAM: J78S366J85
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Hugeicons:
    url: https://github.com/isapozhnik/hugeicons-swift.git
    from: "4.1.6"

targets:
  Stacked:
    type: application
    platform: iOS
    sources:
      - path: Stacked
      - path: Shared
      - path: Stacked/Resources
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Hugeicons
        product: Hugeicons
      - target: StackedWidgetExtension
        embed: true
    entitlements:
      path: Stacked/Stacked.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roarns.stacked.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stacked
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    info:
      path: Stacked/Info.plist
      properties:
        CFBundleName: Stacked
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        CADisableMinimumFrameDurationOnPhone: true
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        NSCalendarsFullAccessUsageDescription: "O Stacked mostra compromissos do Calendário em Hoje e Em breve, e exporta tarefas com hora para o Calendário."
        NSCalendarsWriteOnlyAccessUsageDescription: "O Stacked exporta tarefas com data e hora como eventos no Calendário."
        CFBundleURLTypes:
          - CFBundleURLName: com.stacked.app
            CFBundleURLSchemes:
              - stacked
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
            UIPrerenderedIcon: false
          CFBundleAlternateIcons:
            carvao:
              CFBundleIconFiles:
                - AppIcon-carvao
              UIPrerenderedIcon: false
            grafite:
              CFBundleIconFiles:
                - AppIcon-grafite
              UIPrerenderedIcon: false
            fosco:
              CFBundleIconFiles:
                - AppIcon-fosco
              UIPrerenderedIcon: false
            titanio:
              CFBundleIconFiles:
                - AppIcon-titanio
              UIPrerenderedIcon: false
            cinza_escuro:
              CFBundleIconFiles:
                - AppIcon-cinza_escuro
              UIPrerenderedIcon: false
            cinza_medio:
              CFBundleIconFiles:
                - AppIcon-cinza_medio
              UIPrerenderedIcon: false
            azul_nevoa:
              CFBundleIconFiles:
                - AppIcon-azul_nevoa
              UIPrerenderedIcon: false
            azul_oceano:
              CFBundleIconFiles:
                - AppIcon-azul_oceano
              UIPrerenderedIcon: false

  StackedWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StackedWidget
      - path: Shared
    entitlements:
      path: StackedWidget/StackedWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roarns.stacked.app.widget
        SKIP_INSTALL: YES
        INFOPLIST_FILE: StackedWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO

schemes:
  Stacked:
    build:
      targets:
        Stacked: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
